name: Release

# Publish the ideal-harness package to npm when a v* tag is pushed.
# Requires repo secret NPM_TOKEN (an npm automation token with publish rights).
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      # Gate the release on the same checks as CI.
      - run: pnpm biome
      - run: pnpm build
      - run: pnpm test
      - run: node dist/core/cli/index.js validate .
      # Publish the single package with npm provenance.
      - run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
